services:
  - type: web
    name: smart-competency-backend
    env: python
    region: oregon
    plan: free
    runtime: python-3.11
    buildCommand: pip install -r requirements_optimized.txt
    startCommand: cd backend && gunicorn -w 2 -b 0.0.0.0:$PORT -t 30 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: true
    autoDeploy: true
    healthCheckPath: /
    previewPlan: free
    maxInstances: 1
